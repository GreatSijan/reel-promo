name: Render Acacia Videos

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        composition: [AcaciaHR, AcaciaEN]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libgbm1 \
            libxkbcommon0 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libdrm2 \
            ffmpeg

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Render video
        run: |
          mkdir -p out
          npx remotion render \
            src/index.ts \
            ${{ matrix.composition }} \
            out/${{ matrix.composition }}.mp4 \
            --log=verbose

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.composition }}
          path: out/${{ matrix.composition }}.mp4
          retention-days: 14
