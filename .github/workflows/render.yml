name: Render Villa Milana Reel

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Render frames
        run: npx remotion render VillaMilanaReel out/frames/ --sequence --image-format=png

      - name: Render audio
        run: npx remotion render VillaMilanaReel out/audio.wav --codec=wav

      - name: Encode video
        run: |
          ffmpeg \
            -framerate 30 \
            -i out/frames/element-%03d.png \
            -i out/audio.wav \
            -c:v libx264 \
            -c:a aac \
            -shortest \
            -pix_fmt yuv420p \
            -movflags +faststart \
            out/villa-milana-reel.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: villa-milana-reel
          path: out/villa-milana-reel.mp4
