name: Render Acacia Videos

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        composition: [AcaciaHR, AcaciaEN]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libgbm1 \
            libxkbcommon0 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libdrm2 \
            ffmpeg

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Render PNG sequence
        run: |
          mkdir -p out/frames_${{ matrix.composition }}
          npx remotion render \
            src/index.ts \
            ${{ matrix.composition }} \
            out/frames_${{ matrix.composition }} \
            --image-format=png \
            --log=verbose

      - name: Extract audio as WAV
        run: |
          ffmpeg -y \
            -i public/"In alto mare (2022 Remastered).mp3" \
            -ar 44100 -ac 2 \
            out/audio_${{ matrix.composition }}.wav

      - name: Stitch frames + audio with FFmpeg
        run: |
          ffmpeg -y \
            -framerate 30 \
            -i out/frames_${{ matrix.composition }}/%08d.png \
            -i out/audio_${{ matrix.composition }}.wav \
            -c:v libx264 \
            -preset slow \
            -crf 18 \
            -pix_fmt yuv420p \
            -c:a aac \
            -b:a 192k \
            -shortest \
            out/${{ matrix.composition }}.mp4

      - name: Upload rendered video
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.composition }}
          path: out/${{ matrix.composition }}.mp4
          retention-days: 14
