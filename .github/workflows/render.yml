name: Render Krasna kuca Reel

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Render V1 frames
        run: npx remotion render KrasnaKucaV1 out/frames-v1/ --sequence

      - name: Render V1 audio
        run: npx remotion render KrasnaKucaV1 out/audio-v1.wav --codec=wav

      - name: Encode V1
        run: |
          ffmpeg \
            -framerate 30 \
            -i out/frames-v1/element-%03d.jpeg \
            -i out/audio-v1.wav \
            -c:v libx264 \
            -c:a aac \
            -shortest \
            -pix_fmt yuv420p \
            -movflags +faststart \
            out/krasna-kuca-v1.mp4

      - name: Render V2 frames
        run: npx remotion render KrasnaKucaV2 out/frames-v2/ --sequence

      - name: Render V2 audio
        run: npx remotion render KrasnaKucaV2 out/audio-v2.wav --codec=wav

      - name: Encode V2
        run: |
          ffmpeg \
            -framerate 30 \
            -i out/frames-v2/element-%03d.jpeg \
            -i out/audio-v2.wav \
            -c:v libx264 \
            -c:a aac \
            -shortest \
            -pix_fmt yuv420p \
            -movflags +faststart \
            out/krasna-kuca-v2.mp4

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: krasna-kuca-reels
          path: |
            out/krasna-kuca-v1.mp4
            out/krasna-kuca-v2.mp4
