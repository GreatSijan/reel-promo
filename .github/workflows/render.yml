name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Render video
        run: |
          npx remotion render DuxiosReel2 out/frames/ --sequence
          ffmpeg -framerate 30 -i out/frames/element-%03d.jpeg -c:v libx264 -pix_fmt yuv420p out/duxios.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: duxios-reel
          path: out/duxios.mp4
          retention-days: 7
