name: Render Acacia Reel

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgbm1 libasound2t64 \
            libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 \
            libpango-1.0-0 libcairo2 ffmpeg

      - name: Create output dirs
        run: mkdir -p out/frames

      - name: Render PNG sequence
        run: |
          npx remotion render AcaciaReel \
            --image-format=png \
            --sequence \
            --output=out/frames/

      - name: Render audio WAV
        run: |
          npx remotion render AcaciaReel \
            --output=out/audio.wav

      - name: Encode final MP4
        run: |
          ffmpeg -y \
            -framerate 30 \
            -i out/frames/element-%03d.png \
            -i out/audio.wav \
            -c:v libx264 \
            -c:a aac \
            -shortest \
            -pix_fmt yuv420p \
            -crf 18 \
            out/acacia-reel.mp4

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: acacia-reel
          path: out/acacia-reel.mp4
