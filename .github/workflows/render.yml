name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg chromium-browser

      - name: Render HR video
        run: |
          npx remotion render DuxiosPromoHR out/frames-hr/ --sequence
          ffmpeg -framerate 30 -i out/frames-hr/element-%03d.jpeg \
            -i public/dark-drone-ambient.mp3 \
            -i public/cinematic-impact-hit.mp3 \
            -filter_complex "[1:a]volume=0.4[a1];[2:a]volume=0.9[a2];[a1][a2]amix=inputs=2:duration=first[aout]" \
            -map 0:v -map "[aout]" \
            -c:v libx264 -c:a aac -pix_fmt yuv420p -shortest \
            out/duxios-hr.mp4

      - name: Render EN video
        run: |
          npx remotion render DuxiosPromoEN out/frames-en/ --sequence
          ffmpeg -framerate 30 -i out/frames-en/element-%03d.jpeg \
            -i public/dark-drone-ambient.mp3 \
            -i public/cinematic-impact-hit.mp3 \
            -filter_complex "[1:a]volume=0.4[a1];[2:a]volume=0.9[a2];[a1][a2]amix=inputs=2:duration=first[aout]" \
            -map 0:v -map "[aout]" \
            -c:v libx264 -c:a aac -pix_fmt yuv420p -shortest \
            out/duxios-en.mp4

      - name: Upload HR video
        uses: actions/upload-artifact@v4
        with:
          name: duxios-promo-HR
          path: out/duxios-hr.mp4
          retention-days: 7

      - name: Upload EN video
        uses: actions/upload-artifact@v4
        with:
          name: duxios-promo-EN
          path: out/duxios-en.mp4
          retention-days: 7
