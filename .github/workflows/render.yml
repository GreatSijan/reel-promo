name: Render Krasna kuca Reel

on:
  push:
    branches: [main]

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Render frames
        run: npx remotion render KrasnaKucaReel out/frames/ --sequence

      - name: Encode video with audio
        run: |
          /usr/bin/ffmpeg \
            -framerate 30 \
            -i out/frames/element-%03d.jpeg \
            -i public/dark-drone-ambient.mp3 \
            -c:v libx264 \
            -c:a aac \
            -shortest \
            -pix_fmt yuv420p \
            out/krasna-kuca-reel.mp4

      - name: Upload video
        uses: actions/upload-artifact@v4
        with:
          name: krasna-kuca-reel
          path: out/krasna-kuca-reel.mp4
